<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>英傑大戦 デッキビューア</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", "Hiragino Sans", sans-serif; background: #0f1923; color: #e0e0e0; line-height: 1.6; }

    .navbar { background: #1a2a3a; padding: 0.8rem 2rem; display: flex; align-items: center; gap: 2rem; border-bottom: 2px solid #c8a84e; }
    .nav-brand { color: #c8a84e; font-size: 1.2rem; font-weight: bold; text-decoration: none; cursor: pointer; }

    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    h1 { color: #c8a84e; margin-bottom: 1rem; }
    a { color: #5b9bd5; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: #1a2a3a; border-radius: 8px; padding: 1rem; text-align: center; border: 1px solid #2a3a4a; }
    .stat-value { font-size: 2rem; font-weight: bold; color: #c8a84e; }
    .stat-label { color: #789; font-size: 0.85rem; }

    /* Badges */
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }

    /* Video grid */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .video-card { background: #1a2a3a; border: 1px solid #2a3a4a; border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: border-color 0.15s, background 0.15s; cursor: pointer; }
    .video-card:hover { border-color: #c8a84e; background: #1e3040; }
    .vc-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #0f1923; overflow: hidden; }
    .vc-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .vc-body { padding: 8px 10px 10px; }
    .vc-title { font-size: 0.85rem; font-weight: 600; color: #ddd; margin-bottom: 4px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .vc-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .vc-battles { color: #9ab; font-size: 0.78rem; }
    .vc-record { font-size: 0.78rem; }
    .vc-record .win { color: #27ae60; }
    .vc-record .loss { color: #e74c3c; }
    .vc-channel { color: #789; font-size: 0.75rem; }
    .vc-no-battles { color: #456; font-size: 0.78rem; }
    .vc-date { color: #567; font-size: 0.75rem; margin-left: auto; }

    /* Video detail header */
    .page-header { margin-bottom: 1.2rem; }
    .breadcrumb { color: #567; font-size: 0.82rem; margin-bottom: 0.3rem; }
    .breadcrumb a { color: #789; text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { color: #fff; }
    .video-stats { display: flex; align-items: center; gap: 10px; margin-top: 6px; font-size: 0.9rem; }
    .video-stats .win { color: #27ae60; font-weight: bold; }
    .video-stats .loss { color: #e74c3c; font-weight: bold; }

    /* Battle list */
    .battle-list { display: flex; flex-direction: column; gap: 8px; }

    .bl-row {
      display: flex;
      gap: 12px;
      background: #1a2a3a;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      overflow: hidden;
    }
    .bl-row:hover { background: #1e3040; border-color: #3a4a5a; }

    .bl-thumb { flex: 0 0 480px; height: 270px; overflow: hidden; background: #0f1923; }
    .bl-thumb img { width: 480px; height: 270px; object-fit: cover; display: block; transition: opacity 0.2s; }
    .bl-thumb img:hover { opacity: 0.85; }
    .bl-thumb-empty { width: 480px; height: 270px; background: #111; }

    .bl-info { flex: 1; display: flex; flex-direction: column; gap: 8px; padding: 10px 12px 10px 0; min-width: 0; }

    .bl-metabar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .bl-ts { color: #789; font-size: 0.85rem; font-variant-numeric: tabular-nums; }
    .bl-ytbtn { padding: 2px 10px; background: #c00; color: #fff; border-radius: 4px; font-size: 0.8rem; text-decoration: none; white-space: nowrap; }
    .bl-ytbtn:hover { background: #e00; }

    .bl-decks { display: flex; gap: 8px; align-items: flex-start; flex: 1; }
    .bl-deck-col { flex: 1; min-width: 0; }
    .bl-deck-label { font-size: 0.75rem; color: #789; margin-bottom: 4px; }
    .bl-cost { background: #2a3a4a; border-radius: 3px; padding: 1px 5px; margin-left: 6px; color: #c8a84e; font-size: 0.75rem; }
    .bl-cards { display: flex; flex-wrap: wrap; gap: 3px; }
    .bl-empty { color: #456; font-size: 0.8rem; }
    .bl-vs-col { flex: 0 0 28px; text-align: center; color: #c8a84e; font-weight: bold; padding-top: 20px; }

    .card-tag { display: inline-block; padding: 2px 7px; margin: 2px 0; border-radius: 4px; font-size: 0.8rem; background: #2a3a4a; }
    .card-tag em { font-style: normal; color: #c8a84e; font-size: 0.7rem; }

    /* Faction colors */
    .faction-蒼 { border-left: 3px solid #3498db; }
    .faction-緋 { border-left: 3px solid #e74c3c; }
    .faction-碧 { border-left: 3px solid #2ecc71; }
    .faction-玄 { border-left: 3px solid #9b59b6; }
    .faction-紫 { border-left: 3px solid #8e44ad; }
    .faction-琥 { border-left: 3px solid #f39c12; }
    .faction-黄 { border-left: 3px solid #f1c40f; }

    /* Result badges */
    .result { padding: 2px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
    .result-勝利 { background: #27ae60; color: #fff; }
    .result-敗北 { background: #e74c3c; color: #fff; }
    .result-引き分け { background: #f39c12; color: #000; }
    .result-unknown, .result- { background: #555; color: #999; }

    .empty { color: #789; font-style: italic; padding: 2rem; text-align: center; }

    /* Responsive */
    @media (max-width: 900px) {
      .bl-thumb { flex: 0 0 240px; height: 135px; }
      .bl-thumb img { width: 240px; height: 135px; }
      .bl-thumb-empty { width: 240px; height: 135px; }
    }
    @media (max-width: 600px) {
      .bl-row { flex-direction: column; }
      .bl-thumb { flex: none; width: 100%; height: auto; }
      .bl-thumb img { width: 100%; height: auto; }
      .bl-info { padding: 8px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="nav-brand" onclick="showVideoList()">英傑大戦 デッキビューア</span>
</nav>

<div class="container">
  <!-- Video list view -->
  <div id="view-list">
    <h1>配信一覧</h1>
    <div class="stats-grid" id="stats"></div>
    <div class="video-grid" id="videoGrid"></div>
  </div>

  <!-- Video detail view -->
  <div id="view-detail" style="display:none;">
    <div class="page-header">
      <div class="breadcrumb"><a onclick="showVideoList()">配信一覧</a> &rsaquo; <span id="detail-channel"></span></div>
      <h1 id="detail-title"></h1>
      <div class="video-stats" id="detail-stats"></div>
    </div>
    <div class="battle-list" id="battleList"></div>
  </div>
</div>

<script>
  let allData = { battles: [], videos: [], channels: [] };

  async function loadData() {
    try {
      const res = await fetch('./data/battles.json');
      allData = await res.json();
      renderStats();
      renderVideoGrid();
    } catch (e) {
      document.getElementById('videoGrid').innerHTML = '<div class="empty">データの読み込みに失敗しました</div>';
    }
  }

  function getChannel(channelId) {
    return allData.channels.find(c => c.id === channelId) || {};
  }

  function getBattlesForVideo(videoId) {
    return allData.battles.filter(b => b.video_id === videoId);
  }

  function fmtTime(seconds) {
    if (!seconds && seconds !== 0) return '';
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    return h > 0
      ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
      : `${m}:${String(s).padStart(2,'0')}`;
  }

  function fmtDate(isoStr) {
    if (!isoStr) return '';
    return isoStr.slice(0, 10).replace(/-/g, '/');
  }

  function renderStats() {
    const totalBattles = allData.battles.length;
    const wins = allData.battles.filter(b => b.result === '勝利').length;
    const losses = allData.battles.filter(b => b.result === '敗北').length;
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-value">${allData.videos.length}</div><div class="stat-label">配信数</div></div>
      <div class="stat-card"><div class="stat-value">${totalBattles}</div><div class="stat-label">総バトル数</div></div>
      <div class="stat-card"><div class="stat-value">${wins}</div><div class="stat-label">勝利</div></div>
      <div class="stat-card"><div class="stat-value">${losses}</div><div class="stat-label">敗北</div></div>
    `;
  }

  function renderVideoGrid() {
    // Sort videos newest first
    const sorted = [...allData.videos].sort((a, b) => {
      return (b.published_at || '').localeCompare(a.published_at || '');
    });

    const grid = document.getElementById('videoGrid');
    if (sorted.length === 0) {
      grid.innerHTML = '<div class="empty">動画がありません</div>';
      return;
    }

    grid.innerHTML = sorted.map(v => {
      const battles = getBattlesForVideo(v.id);
      const wins = battles.filter(b => b.result === '勝利').length;
      const losses = battles.filter(b => b.result === '敗北').length;
      const channel = getChannel(v.channel_id);
      const thumb = `https://img.youtube.com/vi/${v.youtube_id}/mqdefault.jpg`;

      const recordHtml = (wins || losses)
        ? `<span class="vc-record"><span class="win">${wins}勝</span> <span class="loss">${losses}敗</span></span>`
        : '';
      const battlesHtml = battles.length
        ? `<span class="vc-battles">${battles.length}試合</span>${recordHtml}`
        : `<span class="vc-no-battles">試合データなし</span>`;

      return `
        <div class="video-card" onclick="showVideoDetail(${v.id})">
          <div class="vc-thumb">
            <img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">
          </div>
          <div class="vc-body">
            <div class="vc-title">${v.title || v.youtube_id}</div>
            <div class="vc-meta">
              ${channel.name ? `<span class="vc-channel">${channel.name}</span>` : ''}
              ${battlesHtml}
              ${v.published_at ? `<span class="vc-date">${fmtDate(v.published_at)}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function cardTag(c) {
    const factionClass = c.faction ? `faction-${c.faction}` : '';
    const cost = c.cost ? ` <em>${c.cost}</em>` : '';
    return `<span class="card-tag ${factionClass}">${c.name}${cost}</span>`;
  }

  function showVideoDetail(videoId) {
    const video = allData.videos.find(v => v.id === videoId);
    if (!video) return;

    const battles = getBattlesForVideo(videoId);
    const channel = getChannel(video.channel_id);
    const wins = battles.filter(b => b.result === '勝利').length;
    const losses = battles.filter(b => b.result === '敗北').length;

    document.getElementById('detail-channel').textContent = channel.name || '';
    document.getElementById('detail-title').textContent = video.title || video.youtube_id;

    const statsEl = document.getElementById('detail-stats');
    statsEl.innerHTML = `
      <span>${battles.length}試合</span>
      ${wins ? `<span class="win">${wins}勝</span>` : ''}
      ${losses ? `<span class="loss">${losses}敗</span>` : ''}
      <a href="https://www.youtube.com/watch?v=${video.youtube_id}" target="_blank" class="bl-ytbtn">▶ YouTube</a>
    `;

    const listEl = document.getElementById('battleList');
    if (battles.length === 0) {
      listEl.innerHTML = '<p class="empty">試合データがありません。</p>';
    } else {
      listEl.innerHTML = battles.map(b => {
        const ts = Math.floor(b.frame_timestamp || 0);
        const ytLink = `https://www.youtube.com/watch?v=${video.youtube_id}&t=${ts}s`;
        const p1 = b.player1 || [];
        const p2 = b.player2 || [];
        const p1Cost = p1.reduce((s, c) => s + (c.cost || 0), 0);
        const p2Cost = p2.reduce((s, c) => s + (c.cost || 0), 0);
        const resultKey = b.result || '';
        const thumbHtml = b.frame_image
          ? `<a href="${ytLink}" target="_blank"><img src="data/${b.frame_image}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=bl-thumb-empty></div>'"></a>`
          : `<div class="bl-thumb-empty"></div>`;

        return `
          <div class="bl-row">
            <div class="bl-thumb">${thumbHtml}</div>
            <div class="bl-info">
              <div class="bl-metabar">
                <span class="result result-${resultKey}">${resultKey || '?'}</span>
                <span class="bl-ts">${fmtTime(b.frame_timestamp)}</span>
                <a class="bl-ytbtn" href="${ytLink}" target="_blank">▶ YouTube</a>
              </div>
              <div class="bl-decks">
                <div class="bl-deck-col">
                  <div class="bl-deck-label">Player 1 ${p1Cost ? `<span class="bl-cost">Σ${p1Cost}</span>` : ''}</div>
                  <div class="bl-cards">
                    ${p1.length ? p1.map(cardTag).join('') : '<span class="bl-empty">未検出</span>'}
                  </div>
                </div>
                <div class="bl-vs-col">VS</div>
                <div class="bl-deck-col">
                  <div class="bl-deck-label">Player 2 ${p2Cost ? `<span class="bl-cost">Σ${p2Cost}</span>` : ''}</div>
                  <div class="bl-cards">
                    ${p2.length ? p2.map(cardTag).join('') : '<span class="bl-empty">未検出</span>'}
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('view-list').style.display = 'none';
    document.getElementById('view-detail').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function showVideoList() {
    document.getElementById('view-detail').style.display = 'none';
    document.getElementById('view-list').style.display = 'block';
    window.scrollTo(0, 0);
  }

  loadData();
</script>
</body>
</html>
